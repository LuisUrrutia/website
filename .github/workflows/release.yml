name: Release and Deploy

on:
  push:
    branches:
      - main

env:
  CLOUDFLARE_PROJECT_NAME: personal-website

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubicloud-standard-2
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      new-release-version: ${{ steps.release.outputs.new-release-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".bun-version"

      - name: Cache Bun dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          bunx
          --package semantic-release@25.0.3
          --package @semantic-release/commit-analyzer@13.0.1
          --package @semantic-release/release-notes-generator@14.1.0
          --package @semantic-release/github@12.0.6
          --package @semantic-release/exec@7.1.0
          semantic-release

      - name: Upload build artifact
        if: steps.release.outputs.new-release-published == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist-${{ steps.release.outputs.new-release-version }}
          path: dist/
          retention-days: 7

  deploy:
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubicloud-standard-2
    permissions: {}
    environment:
      name: production
      url: https://urrutia.me
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-${{ needs.release.outputs.new-release-version }}
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --commit-hash=${{ github.sha }}

  lighthouse:
    needs: deploy
    runs-on: ubicloud-standard-2
    permissions: {}
    steps:
      - name: Lighthouse audit
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
        with:
          urls: |
            https://urrutia.me/
            https://urrutia.me/es/
            https://urrutia.me/blog/
            https://urrutia.me/es/blog/
          runs: 3
          uploadArtifacts: true
          temporaryPublicStorage: true
